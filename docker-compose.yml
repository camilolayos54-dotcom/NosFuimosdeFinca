version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nosfuimos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_db_password_here
      POSTGRES_DB: nosfuimos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
